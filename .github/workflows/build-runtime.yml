# Build-runtime CI matrix — mixdog 0.4.0 Track C
# Triggers: workflow_dispatch or tags matching runtime-v*
# Produces per-platform tarballs + uploads to GH release.
# Aggregator job assembles runtime-manifest.json and opens auto-PR.

name: Build Runtime

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. runtime-v0.4.0)"
        required: false
        default: "runtime-v0.4.0"
  push:
    tags:
      - "runtime-v*"

permissions:
  contents: write       # upload release assets
  pull-requests: write  # auto-PR for manifest update

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-22.04
            script: scripts/build-runtime-linux.sh
          # TODO: ubuntu-22.04-arm is not in the free-tier GitHub-hosted runner set.
          # Uncomment when self-hosted ARM runner or paid tier is available.
          # - os: linux
          #   arch: arm64
          #   runner: ubuntu-22.04-arm
          #   script: scripts/build-runtime-linux.sh
          - os: darwin
            arch: x64
            runner: macos-13
            script: scripts/build-runtime-macos.sh
          - os: darwin
            arch: arm64
            runner: macos-14
            script: scripts/build-runtime-macos.sh
          - os: win32
            arch: x64
            runner: windows-2022
            script: scripts/build-runtime-windows.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make build script executable (unix)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.script }}

      - name: Run build script (unix)
        if: runner.os != 'Windows'
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: bash ${{ matrix.script }}

      - name: Run build script (windows)
        if: runner.os == 'Windows'
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: .\${{ matrix.script }}

      - name: List dist artifacts
        if: runner.os != 'Windows'
        run: ls -lh dist/

      - name: List dist artifacts (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem dist/

      - name: Upload tarballs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/mixdog-runtime-*.tar.gz
            dist/mixdog-runtime-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aggregate:
    name: aggregate-manifest
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate runtime-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/generate-runtime-manifest.mjs

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/runtime-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open auto-PR to update bundled manifest
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update bundled runtime-manifest.json for ${{ inputs.tag || github.ref_name }}"
          branch: chore/runtime-manifest-${{ inputs.tag || github.ref_name }}
          title: "chore: runtime-manifest.json — ${{ inputs.tag || github.ref_name }}"
          body: |
            Auto-generated by the build-runtime workflow.
            Updates `src/memory/data/runtime-manifest.json` with asset URLs and sha256
            hashes from the ${{ inputs.tag || github.ref_name }} release.
          add-paths: src/memory/data/runtime-manifest.json
