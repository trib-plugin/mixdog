# Build PG 16.4 + pgvector 0.8.2 runtime tarballs per supported OS.
# Triggers: workflow_dispatch (default tag runtime-v0.4.0) or push tag runtime-v*.
# Linux job runs in ubuntu:20.04 container so produced binaries link against
# glibc 2.31 — works on every distro from Ubuntu 20.04 / Debian 11 forward.
# Output: per-OS tarballs + manifest uploaded to the release.

name: Build Runtime

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. runtime-v0.4.0)"
        required: false
        default: "runtime-v0.4.0"
  push:
    tags:
      - "runtime-v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: x64,   runner: ubuntu-22.04, container: 'ubuntu:20.04', script: scripts/build-runtime-linux.sh   }
          - { os: darwin, arch: arm64, runner: macos-14,     container: '',             script: scripts/build-runtime-macos.sh   }
          - { os: win32,  arch: x64,   runner: windows-2022, container: '',             script: scripts/build-runtime-windows.ps1 }
          # linux-arm64 / darwin-x64 omitted — no free GitHub-hosted runner.

    steps:
      - uses: actions/checkout@v4

      - name: Build (unix)
        if: runner.os != 'Windows'
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x ${{ matrix.script }}
          bash ${{ matrix.script }}
          ls -lh dist/

      - name: Build (windows)
        if: runner.os == 'Windows'
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: |
          .\${{ matrix.script }}
          Get-ChildItem dist/

      - name: Upload tarballs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/mixdog-runtime-*.tar.gz
            dist/mixdog-runtime-*.tar.gz.sha256

  aggregate:
    name: aggregate-manifest
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate runtime-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/generate-runtime-manifest.mjs

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/runtime-manifest.json

      - name: Publish manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-manifest
          path: dist/runtime-manifest.json
